apiVersion: apps/v1
kind: Deployment
metadata:
  name: mentoria-k8s
  namespace: mentoria-k8s
  labels:
    app: mentoria-k8s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mentoria-k8s
  template:
    metadata:
      labels:
        app: mentoria-k8s
    spec:
      containers:
      - name: mentoria-k8s
        image: okarinadantas/mentoria-k8s:v1
        ports:
        - containerPort: 5000
